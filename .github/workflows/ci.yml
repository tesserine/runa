name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests
        env:
          RUST_TEST_THREADS: "1"
        run: cargo test --workspace

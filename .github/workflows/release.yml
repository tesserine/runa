name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require annotated tag
        run: |
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = tag

      - name: Require tag target on main
        run: |
          set -euo pipefail
          git fetch --force origin refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")"
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build runa binaries
        run: cargo build --release --locked --bin runa --bin runa-mcp

      - name: Verify release artifacts
        run: |
          ./scripts/release-check release "$GITHUB_REF_NAME" \
            --runa-bin target/release/runa \
            --runa-mcp-bin target/release/runa-mcp

      - name: Extract release notes
        run: ./scripts/release-check notes "$GITHUB_REF_NAME" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_flags=()
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+$ ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "runa $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag \
            "${release_flags[@]}"

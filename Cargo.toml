[workspace]
members = ["runa-cli", "libagent"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
libagent = { path = "libagent" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
jsonschema = "0.28"
toml = "0.8"
